<div class="shop">
  <div class="dumpling-container">
    <app-dumpling *ngFor="let item of counter(quantity)" [color]="color"></app-dumpling>
  </div>
  <div class="dumpling-customizations">
    <mat-card class="fillings selection-card">
      <mat-card-title>Fillings</mat-card-title>
      <mat-card-content>  
        <p>Vegan</p>
        <mat-checkbox name="bokchoy" [(ngModel)]="fillings.bokchoy">Bok Choy</mat-checkbox>
        <mat-checkbox name="tofu" [(ngModel)]="fillings.tofu">Tofu & Shitake</mat-checkbox>

        <p>Meat</p>
        <mat-checkbox name="chicken" [(ngModel)]="fillings.chicken">Chicken</mat-checkbox>
        <mat-checkbox name="impossible" [(ngModel)]="fillings.impossible">Impossible Meat</mat-checkbox>
      </mat-card-content>
    </mat-card>
    <mat-card class="quantity selection-card">
      <mat-card-title id="quantity-label">Quantity</mat-card-title>
      <mat-card-content>
        <mat-slider
          aria-labelledby="quantity-label"
          color="primary"
          class="quantity-slider"
          [max]="13"
          [min]="1"
          [step]="1"
          [thumbLabel]="true"
          [tickInterval]="1"
          [(ngModel)]="quantity">
        </mat-slider>
      </mat-card-content>
    </mat-card>
    <mat-card class="color selection-card">
      <mat-card-title>Color</mat-card-title>
      <mat-card-content>
        <app-color-picker [color]="color" (recolor)="changeColor($event)"></app-color-picker>
      </mat-card-content>
    </mat-card>
  </div>
  <button mat-raised-button type="button" (click)="fauxPurchase()" class="purchase-button">
    <span>Purchase</span>
  </button>
</div>
